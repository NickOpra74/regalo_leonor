<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestro álbum 📖</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>
 
    body {
      background: radial-gradient(ellipse at 30% 20%, #daeeff 0%, #eee6f7 45%, #fde8ed 100%);
      min-height: 100vh;
      padding-bottom: 50px;
      overflow-x: hidden;
    }
 
    /* HEADER */
    .alm-header {
      text-align: center;
      padding: 28px 20px 12px;
      position: relative; z-index: 20;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #85C1E9; text-decoration: none;
      font-size: 0.88rem; font-weight: 700; margin-bottom: 8px;
      transition: color .2s;
    }
    .back-link:hover { color: #5DADE2; }
    .alm-header h1 {
      font-size: 1.7rem; color: #3D4A5C;
      font-style: italic; margin-bottom: 2px;
    }
    .alm-header .sub {
      font-family: 'Dancing Script', cursive;
      font-size: 0.95rem; color: #C39BD3;
    }
 
    /* ══════════════════════════════
       LIBRO ABIERTO (dos páginas)
    ══════════════════════════════ */
    .book-scene {
      perspective: 2200px;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 12px;
      position: relative; z-index: 10;
    }
 
    /* Contenedor del libro abierto */
    .open-book {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 1.35;
      display: flex;
      filter: drop-shadow(0 16px 40px rgba(80,100,140,.28));
    }
 
    /* Lomo central */
    .book-gutter {
      position: absolute;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 18px; height: 100%;
      background: linear-gradient(to right, #c5d8e8 0%, #e8dff5 50%, #c5d8e8 100%);
      z-index: 10;
      box-shadow: 0 0 12px rgba(0,0,0,.18);
    }
 
    /* Página izquierda y derecha */
    .book-page {
      flex: 1;
      background: #fffdf8;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 14px 16px 10px;
      border: 1px solid #e8e0d0;
    }
    .book-page.left {
      border-radius: 10px 0 0 10px;
      box-shadow: inset -6px 0 14px rgba(0,0,0,.06);
      /* Efecto de curvatura en lomo */
      background: linear-gradient(to right, #f5f0e8 0%, #fffdf8 8%);
    }
    .book-page.right {
      border-radius: 0 10px 10px 0;
      box-shadow: inset 6px 0 14px rgba(0,0,0,.06);
      background: linear-gradient(to left, #f5f0e8 0%, #fffdf8 8%);
    }
 
    /* Líneas horizontales tipo papel */
    .book-page::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 28px,
        rgba(200,220,240,.18) 28px, rgba(200,220,240,.18) 29px
      );
      pointer-events: none;
    }
 
    /* Encabezado de página */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 1.5px solid #e8d8c8;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .page-month {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      font-style: italic; color: #3D4A5C;
    }
    .page-num {
      font-size: clamp(0.55rem, 1.2vw, 0.7rem);
      color: #C0C9D4;
      font-family: 'Lato', sans-serif;
    }
 
    /* GRID DE FOTOS */
    .photos-grid {
      flex: 1;
      display: grid;
      gap: clamp(5px, 1.2vw, 9px);
      min-height: 0;
      position: relative; z-index: 1;
    }
    .photos-grid.n1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .photos-grid.n2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    .photos-grid.n3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .photos-grid.n3 .photo-cell:first-child { grid-column: 1 / -1; }
    .photos-grid.n4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
 
    /* Celda foto + fecha */
    .photo-cell {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      min-height: 0;
    }
 
    .img-wrap {
      flex: 1; width: 100%;
      position: relative;
      border-radius: 5px;
      overflow: hidden;
      min-height: 0;
      /* Efecto foto impresa con borde blanco tipo polaroid */
      box-shadow:
        0 0 0 3px #fff,
        0 2px 10px rgba(0,0,0,.18);
      background: #e8e0d0;
    }
    /* Brillo foto impresa */
    .img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.2) 0%, transparent 50%);
      pointer-events: none;
    }
    .img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
 
    /* Fecha debajo de la foto */
    .photo-date {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(0.5rem, 1.1vw, 0.68rem);
      color: #8A9AB0;
      text-align: center;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1;
    }
 
    /* Pie de página */
    .page-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px; padding-top: 6px;
      border-top: 1px solid #e8d8c8;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .pg-hearts { font-size: clamp(.55rem,.9vw,.7rem); color: #F2A7B3; letter-spacing: 2px; }
    .pg-label {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(.55rem,.9vw,.7rem); color: #C39BD3;
    }
 
    /* ── PORTADA (página derecha al inicio) ── */
    .cover-page {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; text-align: center;
      background: linear-gradient(160deg, #daeeff, #f0e6f8 60%, #fde8ed) !important;
      padding: 20px;
      position: relative; z-index: 1;
    }
    .cover-icon { font-size: clamp(2rem,4vw,3rem); margin-bottom: 10px; animation: float 3.5s ease-in-out infinite; }
    .cover-title { font-family: 'Playfair Display',serif; font-size: clamp(1.1rem,2.5vw,1.6rem); font-style: italic; color: #3D4A5C; margin-bottom: 6px; }
    .cover-sub { font-family: 'Dancing Script',cursive; font-size: clamp(.85rem,1.8vw,1.05rem); color: #7EB5D4; margin-bottom: 14px; }
    .cover-line { width: 50px; height: 2px; background: linear-gradient(90deg,#85C1E9,#C39BD3); border-radius: 2px; margin: 0 auto 12px; }
    .cover-note { font-size: clamp(.65rem,1.2vw,.8rem); color: #9BAAB8; font-style: italic; }
    .open-hint { margin-top: 16px; display: flex; align-items: center; gap: 5px; font-size: clamp(.62rem,1.1vw,.78rem); color: #A8C8E0; animation: pulse-soft 2s ease-in-out infinite; }
 
    /* Página en blanco (izquierda en portada) */
    .blank-page {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%;
      position: relative; z-index: 1;
    }
    .blank-deco {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(.8rem,1.6vw,1rem);
      color: #D7BDE2; text-align: center;
      line-height: 2;
    }
 
    /* ── CONTINUARÁ ── */
    .continuara-page {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; text-align: center; padding: 20px;
      position: relative; z-index: 1;
    }
    .cont-icon { font-size: clamp(1.8rem,3.5vw,2.8rem); margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
    .cont-title { font-family: 'Playfair Display',serif; font-size: clamp(.9rem,2vw,1.3rem); font-style: italic; color: #3D4A5C; margin-bottom: 8px; }
    .cont-text { font-family: 'Dancing Script',cursive; font-size: clamp(.75rem,1.4vw,.95rem); color: #C39BD3; line-height: 1.7; }
    .cont-dots { display: flex; gap: 8px; margin-top: 18px; }
    .cont-dots span { width: 8px; height: 8px; border-radius: 50%; animation: pulse-soft 1.6s ease-in-out infinite; }
    .cont-dots span:nth-child(1) { background: #85C1E9; }
    .cont-dots span:nth-child(2) { background: #F2A7B3; animation-delay: .3s; }
    .cont-dots span:nth-child(3) { background: #C39BD3; animation-delay: .6s; }
 
    /* ══════════════════════════════
       ANIMACIÓN FLIP DE PÁGINA
    ══════════════════════════════ */
    .flip-wrapper {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 50;
      perspective: 2200px;
      display: none;
    }
    .flip-wrapper.active { display: block; }
 
    .flip-leaf {
      position: absolute;
      top: 0; right: 0;
      width: 50%; height: 100%;
      transform-origin: left center;
      transform-style: preserve-3d;
    }
    .flip-leaf.fwd { animation: leafFwd .7s cubic-bezier(.4,0,.2,1) forwards; }
    .flip-leaf.bck { animation: leafBck .7s cubic-bezier(.4,0,.2,1) forwards; }
 
    @keyframes leafFwd {
      0%   { transform: rotateY(0deg);    }
      50%  { transform: rotateY(-90deg); filter: drop-shadow(-8px 0 18px rgba(0,0,0,.22)); }
      100% { transform: rotateY(-180deg); }
    }
    @keyframes leafBck {
      0%   { transform: rotateY(-180deg); }
      50%  { transform: rotateY(-90deg);  filter: drop-shadow(-8px 0 18px rgba(0,0,0,.18)); }
      100% { transform: rotateY(0deg);    }
    }
 
    .leaf-front, .leaf-back {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: #fffdf8;
      border: 1px solid #e8e0d0;
      padding: 14px 16px 10px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .leaf-front {
      background: linear-gradient(to left, #f5f0e8 0%, #fffdf8 8%);
    }
    .leaf-back {
      transform: rotateY(180deg);
      background: linear-gradient(to right, #f5f0e8 0%, #fffdf8 8%);
    }
 
    /* ══════════════════════════════
       CONTROLES
    ══════════════════════════════ */
    .album-controls {
      display: flex; align-items: center;
      justify-content: center; gap: 18px;
      margin-top: 16px; position: relative; z-index: 20;
    }
    .nav-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.88);
      box-shadow: 0 4px 16px rgba(133,193,233,.28);
      color: #5DADE2; backdrop-filter: blur(8px);
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
    }
    .nav-btn:hover:not(:disabled) { transform: scale(1.12); background: linear-gradient(135deg,#C8E6FA,#D7BDE2); color: #3D4A5C; }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
    #page-counter { font-family: 'Dancing Script',cursive; font-size: 1rem; color: #85C1E9; min-width: 68px; text-align: center; }
 
    .dots-progress { display: flex; justify-content: center; gap: 7px; margin-top: 12px; position: relative; z-index: 20; flex-wrap: wrap; }
    .dot-item { width: 7px; height: 7px; border-radius: 50%; background: #D7BDE2; cursor: pointer; transition: all .3s ease; }
    .dot-item.active { background: #85C1E9; width: 20px; border-radius: 4px; }
    .swipe-hint { text-align: center; font-size: .72rem; color: #C0C9D4; margin-top: 10px; font-style: italic; }
  </style>
</head>
<body>
 
  <div class="petal-container"></div>
 
  <audio id="bg-audio" loop preload="auto">
    <source src="{{ url_for('static', filename='audio/musica.mp3') }}" type="audio/mpeg">
  </audio>
  <div id="audio-player-container">
    <button id="audio-toggle-btn">🎵</button>
    <span class="audio-label">Nuestra canción</span>
  </div>
 
  <header class="alm-header">
    <a href="{{ url_for('menu') }}" class="back-link">← Volver</a>
    <h1>Nuestro álbum 📖</h1>
    <p class="sub">Cada página, un momento nuestro</p>
  </header>
 
  <!-- LIBRO ABIERTO -->
  <div class="book-scene">
    <div class="open-book" id="open-book">
 
      <!-- Página izquierda -->
      <div class="book-page left" id="page-left"></div>
 
      <!-- Lomo central -->
      <div class="book-gutter"></div>
 
      <!-- Página derecha -->
      <div class="book-page right" id="page-right"></div>
 
      <!-- Hoja animada para el flip -->
      <div class="flip-wrapper" id="flip-wrapper">
        <div class="flip-leaf" id="flip-leaf">
          <div class="leaf-front" id="leaf-front"></div>
          <div class="leaf-back"  id="leaf-back"></div>
        </div>
      </div>
 
    </div>
  </div>
 
  <div class="album-controls">
    <button class="nav-btn" id="prev-btn">&#9664;</button>
    <span id="page-counter">Portada</span>
    <button class="nav-btn" id="next-btn">&#9654;</button>
  </div>
  <div class="dots-progress" id="dots-progress"></div>
  <p class="swipe-hint">Desliza o usa ← → para pasar páginas</p>
 
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
  (function () {
 
    /* ══════════════════════════════════════════════
       SPREADS = pares de páginas (izq + der)
       Cada spread es lo que se ve al abrir el libro.
       Agrega más spreads para más fotos.
    ══════════════════════════════════════════════ */
    const SPREADS = [
      // Spread 0: Portada
      {
        left:  { type: 'blank' },
        right: { type: 'cover' }
      },
      // Spread 1: Diciembre 2025
      {
        left: {
          month: 'Diciembre 2025',
          photos: [
            { src: "{{ url_for('static', filename='assets/images/foto6.jpeg') }}", date: '01 Dic 2025' }
          ]
        },
        right: { type: 'blank', deco: '💙' }
      },
      // Spread 2: Enero 2026
      {
        left: {
          month: 'Enero 2026',
          photos: [
            { src: "{{ url_for('static', filename='assets/images/foto8.jpeg') }}", date: '15 Ene 2026' },
            { src: "{{ url_for('static', filename='assets/images/foto5.jpeg') }}", date: '28 Ene 2026' }
          ]
        },
        right: { type: 'blank', deco: '🌸' }
      },
      // Spread 3: Febrero 2026
      {
        left: {
          month: 'Febrero 2026',
          photos: [
            { src: "{{ url_for('static', filename='assets/images/foto7.jpeg') }}", date: '10 Feb 2026' },
            { src: "{{ url_for('static', filename='assets/images/foto2.jpeg') }}", date: '22 Feb 2026' }
          ]
        },
        right: { type: 'blank', deco: '💜' }
      },
      // Spread 4: Marzo 2026
      {
        left: {
          month: 'Marzo 2026',
          photos: [
            { src: "{{ url_for('static', filename='assets/images/foto4.jpeg') }}", date: '05 Mar 2026' },
            { src: "{{ url_for('static', filename='assets/images/foto1.jpeg') }}", date: '14 Mar 2026' },
            { src: "{{ url_for('static', filename='assets/images/foto3.jpeg') }}", date: '25 Mar 2026' }
          ]
        },
        right: { type: 'blank', deco: '🌺' }
      },
      // Spread 5: Continuará
      {
        left:  { type: 'blank', deco: '✨' },
        right: { type: 'continuara' }
      }
    ];
 
    /* ════════════════════
       BUILDERS HTML
    ════════════════════ */
    function buildPageHTML(page, side, spreadIdx) {
      if (!page) return '';
 
      if (page.type === 'cover') {
        return `<div class="cover-page">
          <span class="cover-icon">📖</span>
          <div class="cover-title">Nuestro álbum</div>
          <div class="cover-sub">01 · 12 · 2025</div>
          <div class="cover-line"></div>
          <p class="cover-note">Un recuerdo por cada mes juntos</p>
          <div class="open-hint"><span>Pasa la página</span><span>▶</span></div>
        </div>`;
      }
 
      if (page.type === 'blank') {
        return `<div class="blank-page">
          <div class="blank-deco">
            ${page.deco ? `<div style="font-size:2rem;margin-bottom:8px;">${page.deco}</div>` : ''}
            <span style="font-family:'Dancing Script',cursive;color:#D7BDE2;font-size:0.85rem;">Nuestros recuerdos</span>
          </div>
        </div>`;
      }
 
      if (page.type === 'continuara') {
        return `<div class="continuara-page">
          <span class="cont-icon">🌙</span>
          <div class="cont-title">Continuará…</div>
          <p class="cont-text">Esta historia apenas comienza.<br>Cada mes nuevo traerá más páginas,<br>más recuerdos, más nosotros.</p>
          <div class="cont-dots"><span></span><span></span><span></span></div>
        </div>`;
      }
 
      // Página normal con fotos
      const n = Math.min(page.photos.length, 4);
      const pgNum = spreadIdx > 0 ? (side === 'left' ? spreadIdx * 2 - 1 : spreadIdx * 2) : '';
      const cellsHTML = page.photos.slice(0, 4).map(p => `
        <div class="photo-cell">
          <div class="img-wrap">
            <img src="${p.src}" alt="${p.date}" loading="lazy">
          </div>
          <span class="photo-date">${p.date}</span>
        </div>`).join('');
 
      return `
        <div class="page-header">
          <span class="page-month">${page.month}</span>
          <span class="page-num">${pgNum ? 'Pág. ' + pgNum : ''}</span>
        </div>
        <div class="photos-grid n${n}">${cellsHTML}</div>
        <div class="page-footer">
          <span class="pg-hearts">♡ ♡ ♡</span>
          <span class="pg-label">Nuestros recuerdos 💙</span>
        </div>`;
    }
 
    /* ════════════════════
       ESTADO
    ════════════════════ */
    const pageLeft   = document.getElementById('page-left');
    const pageRight  = document.getElementById('page-right');
    const flipWrap   = document.getElementById('flip-wrapper');
    const flipLeaf   = document.getElementById('flip-leaf');
    const leafFront  = document.getElementById('leaf-front');
    const leafBack   = document.getElementById('leaf-back');
    const prevBtn    = document.getElementById('prev-btn');
    const nextBtn    = document.getElementById('next-btn');
    const counter    = document.getElementById('page-counter');
    const dotsEl     = document.getElementById('dots-progress');
 
    let current   = 0;
    let animating = false;
 
    // Dots
    SPREADS.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot-item' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });
 
    function renderSpread(idx) {
      const s = SPREADS[idx];
      pageLeft.innerHTML  = buildPageHTML(s.left,  'left',  idx);
      pageRight.innerHTML = buildPageHTML(s.right, 'right', idx);
    }
 
    function syncUI() {
      dotsEl.querySelectorAll('.dot-item').forEach((d, i) =>
        d.classList.toggle('active', i === current));
      if (current === 0) counter.textContent = 'Portada';
      else if (current === SPREADS.length - 1) counter.textContent = '✦';
      else counter.textContent = `${current} / ${SPREADS.length - 2}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === SPREADS.length - 1;
    }
 
    function goTo(target) {
      if (animating || target === current) return;
      if (target < 0 || target >= SPREADS.length) return;
      animating = true;
 
      const fwd = target > current;
      const nextSpread = SPREADS[target];
 
      // Preparar hoja animada
      if (fwd) {
        // La hoja sale de la página derecha actual
        leafFront.innerHTML = buildPageHTML(SPREADS[current].right, 'right', current);
        leafBack.innerHTML  = buildPageHTML(nextSpread.left, 'left', target);
      } else {
        // La hoja vuelve desde la izquierda
        leafFront.innerHTML = buildPageHTML(nextSpread.right, 'right', target);
        leafBack.innerHTML  = buildPageHTML(SPREADS[current].left, 'left', current);
      }
 
      // Mostrar la hoja y animar
      flipWrap.classList.add('active');
      flipLeaf.className = 'flip-leaf';
      void flipLeaf.offsetWidth;
      flipLeaf.classList.add(fwd ? 'fwd' : 'bck');
 
      current = target;
      syncUI();
 
      setTimeout(() => {
        renderSpread(current);
        flipWrap.classList.remove('active');
        flipLeaf.className = 'flip-leaf';
        animating = false;
      }, 710);
    }
 
    // Inicio
    renderSpread(0);
    syncUI();
 
    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'ArrowLeft')  goTo(current - 1);
    });
 
    // Swipe
    let sx = 0;
    const bookEl = document.getElementById('open-book');
    bookEl.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
    bookEl.addEventListener('touchend', e => {
      const diff = sx - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 44) diff > 0 ? goTo(current + 1) : goTo(current - 1);
    });
 
  })();
  </script>
</body>
</html>
