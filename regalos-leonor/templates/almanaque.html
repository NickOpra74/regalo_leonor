<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestro álbum 📖</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>
    /* ── ALMANAQUE ── */
    body {
      background: linear-gradient(160deg, #EBF5FB 0%, #F4ECF7 60%, #FEF0F2 100%);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    .alm-header {
      text-align: center;
      padding: 44px 20px 28px;
      position: relative;
      z-index: 10;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #85C1E9;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 18px;
      transition: color 0.2s;
    }

    .back-link:hover { color: #5DADE2; }

    .alm-header h1 {
      font-size: 2.1rem;
      color: #3D4A5C;
      font-style: italic;
      margin-bottom: 8px;
    }

    .alm-header p {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      color: #C39BD3;
    }

    /* ── VIEWER ── */
    .album-viewer {
      position: relative;
      z-index: 10;
      max-width: 540px;
      margin: 0 auto;
      padding: 0 20px;
      user-select: none;
    }

    /* ── PÁGINAS ── */
    .album-page {
      display: none;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(133,193,233,0.2),
        0 0 0 1px rgba(255,255,255,0.6) inset;
      animation: none;
    }

    .album-page.active {
      display: block;
      animation: pageIn 0.4s ease forwards;
    }

    .album-page.entering {
      animation: pageIn 0.4s ease forwards;
    }

    .album-page.leaving {
      animation: pageOut 0.2s ease forwards;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateX(30px) scale(0.97); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }

    @keyframes pageOut {
      to { opacity: 0; transform: translateX(-30px) scale(0.97); }
    }

    /* ── FOTO SINGLE ── */
    .page-photo {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
    }

    /* ── FOTO DOBLE ── */
    .dual-photos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .dual-photos img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
    }

    /* ── CAPTION ── */
    .page-caption {
      padding: 22px 24px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .month-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: #3D4A5C;
      font-style: italic;
    }

    .page-badge {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      background: linear-gradient(135deg, #C8E6FA, #D7BDE2);
      color: #5D6D7E;
      padding: 5px 14px;
      border-radius: 50px;
    }

    /* ── DECORACIÓN PÁGINA ── */
    .page-deco {
      display: flex;
      gap: 6px;
      padding: 14px 22px 0;
    }

    .deco-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--azul-suave);
    }

    .deco-dot:nth-child(2) { background: var(--rosa-sakura); }
    .deco-dot:nth-child(3) { background: var(--morado-pastel); }

    /* ── CONTROLES ── */
    .album-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 24px;
      position: relative;
      z-index: 10;
    }

    .nav-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: rgba(255,255,255,0.85);
      box-shadow: 0 4px 16px rgba(133,193,233,0.25);
      color: #5DADE2;
      backdrop-filter: blur(8px);
    }

    .nav-btn:hover:not(:disabled) {
      transform: scale(1.12);
      background: linear-gradient(135deg, #C8E6FA, #D7BDE2);
      color: #3D4A5C;
    }

    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    #page-counter {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      color: #85C1E9;
      min-width: 60px;
      text-align: center;
    }

    /* ── HINT SWIPE ── */
    .swipe-hint {
      text-align: center;
      font-size: 0.78rem;
      color: #B0BEC5;
      margin-top: 14px;
      font-style: italic;
      position: relative;
      z-index: 10;
    }

    /* ── DOTS PROGRESS ── */
    .dots-progress {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
      position: relative;
      z-index: 10;
    }

    .dot-item {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #D7BDE2;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .dot-item.active {
      background: #85C1E9;
      width: 22px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="petal-container"></div>

  <audio id="bg-audio" loop preload="auto">
    <source src="{{ url_for('static', filename='assets/audio/musica.mp3') }}" type="audio/mpeg">
  </audio>

  <div id="audio-player-container">
    <button id="audio-toggle-btn">🎵</button>
    <span class="audio-label">Nuestra canción</span>

  <!-- HEADER -->
  <header class="alm-header">
    <a href="{{ url_for('menu') }}" class="back-link">← Volver</a>

    <p>Cada página, un momento nuestro</p>
  </header>

  <!-- ALBUM VIEWER -->
  <div class="album-viewer">

    <!-- Página 1: Diciembre 2025 -->
    <div class="album-page">
      <div class="page-deco">
        <div class="deco-dot"></div><div class="deco-dot"></div><div class="deco-dot"></div>
      </div>
      <img class="page-photo"
           src="{{ url_for('static', filename='assets/images/foto6.jpeg') }}"
           alt="Diciembre 2025"
           loading="lazy">
      <div class="page-caption">
        <span class="month-label">Diciembre 2025</span>
        <span class="page-badge">Página 1</span>
      </div>
    </div>

    <!-- Página 2: Enero 2026 -->
    <div class="album-page">
      <div class="page-deco">
        <div class="deco-dot"></div><div class="deco-dot"></div><div class="deco-dot"></div>
      </div>
      <img class="page-photo"
           src="{{ url_for('static', filename='assets/images/foto8.jpeg') }}"
           alt="Enero 2026"
           loading="lazy">
      <div class="page-caption">
        <span class="month-label">Enero 2026</span>
        <span class="page-badge">Página 2</span>
      </div>
    </div>

    <!-- Página 3: Enero 2026 -->
    <div class="album-page">
      <div class="page-deco">
        <div class="deco-dot"></div><div class="deco-dot"></div><div class="deco-dot"></div>
      </div>
      <img class="page-photo"
           src="{{ url_for('static', filename='assets/images/foto5.jpeg') }}"
           alt="Enero 2026"
           loading="lazy">
      <div class="page-caption">
        <span class="month-label">Enero 2026</span>
        <span class="page-badge">Página 3</span>
      </div>
    </div>

    <!-- Página 4: Febrero 2026 -->
    <div class="album-page">
      <div class="page-deco">
        <div class="deco-dot"></div><div class="deco-dot"></div><div class="deco-dot"></div>
      </div>
      <img class="page-photo"
           src="{{ url_for('static', filename='assets/images/foto7.jpeg') }}"
           alt="Febrero 2026"
           loading="lazy">
      <div class="page-caption">
        <span class="month-label">Febrero 2026</span>
        <span class="page-badge">Página 4</span>
      </div>
    </div>

    <!-- Página 5: Febrero 2026 -->
    <div class="album-page">
      <div class="page-deco">
        <div class="deco-dot"></div><div class="deco-dot"></div><div class="deco-dot"></div>
      </div>
      <img class="page-photo"
           src="{{ url_for('static', filename='assets/images/foto2.jpeg') }}"
           alt="Febrero 2026"
           loading="lazy">
      <div class="page-caption">
        <span class="month-label">Febrero 2026</span>
        <span class="page-badge">Página 5</span>
      </div>
    </div>

    <!-- Página 6: Marzo 2026 (doble foto) -->
    <div class="album-page">
      <div class="page-deco">
        <div class="deco-dot"></div><div class="deco-dot"></div><div class="deco-dot"></div>
      </div>
      <div class="dual-photos">
        <img src="{{ url_for('static', filename='assets/images/foto4.jpeg') }}"
             alt="Marzo 2026" loading="lazy">
        <img src="{{ url_for('static', filename='assets/images/foto1.jpeg') }}"
             alt="Marzo 2026" loading="lazy">
      </div>
      <div class="page-caption">
        <span class="month-label">Marzo 2026</span>
        <span class="page-badge">Página 6</span>
      </div>
    </div>

    <!-- Página 7: Marzo 2026 -->
    <div class="album-page">
      <div class="page-deco">
        <div class="deco-dot"></div><div class="deco-dot"></div><div class="deco-dot"></div>
      </div>
      <img class="page-photo"
           src="{{ url_for('static', filename='assets/images/foto3.jpeg') }}"
           alt="Marzo 2026"
           loading="lazy">
      <div class="page-caption">
        <span class="month-label">Marzo 2026</span>
        <span class="page-badge">Página 7</span>
      </div>
    </div>

  </div>
  <!-- /album-viewer -->

  <!-- CONTROLES -->
  <div class="album-controls">
    <button class="nav-btn" id="prev-btn" title="Anterior">◀</button>
    <span id="page-counter">1 / 7</span>
    <button class="nav-btn" id="next-btn" title="Siguiente">▶</button>
  </div>

  <!-- DOTS -->
  <div class="dots-progress" id="dots-progress">
    <div class="dot-item active" data-page="0"></div>
    <div class="dot-item" data-page="1"></div>
    <div class="dot-item" data-page="2"></div>
    <div class="dot-item" data-page="3"></div>
    <div class="dot-item" data-page="4"></div>
    <div class="dot-item" data-page="5"></div>
    <div class="dot-item" data-page="6"></div>
  </div>

  <p class="swipe-hint">Desliza o usa las flechas para navegar · ← →</p>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    // Dots sync
    const dots  = document.querySelectorAll('.dot-item');
    const pages = document.querySelectorAll('.album-page');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    // Observar cambios en las páginas para sincronizar dots
    function syncDots(idx) {
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    // Parchear botones para sincronizar dots también
    let currentPage = 0;

    function goToPage(idx) {
      if (idx < 0 || idx >= pages.length) return;
      pages[currentPage].classList.remove('active');
      currentPage = idx;
      pages[currentPage].classList.add('active', 'entering');
      setTimeout(() => pages[currentPage].classList.remove('entering'), 400);
      syncDots(currentPage);
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      document.getElementById('page-counter').textContent = `${currentPage + 1} / ${pages.length}`;
    }

    dots.forEach(d => {
      d.addEventListener('click', () => goToPage(parseInt(d.dataset.page)));
    });

    // Redirigir los botones de main.js para que también sincronicen dots
    prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
    nextBtn.addEventListener('click', () => goToPage(currentPage + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goToPage(currentPage + 1);
      if (e.key === 'ArrowLeft')  goToPage(currentPage - 1);
    });

    // Swipe táctil directo en esta página
    let sx = 0;
    const viewer = document.querySelector('.album-viewer');
    viewer.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
    viewer.addEventListener('touchend', e => {
      const diff = sx - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) diff > 0 ? goToPage(currentPage + 1) : goToPage(currentPage - 1);
    });

    // Inicio
    goToPage(0);
  </script>
</body>
</html>
