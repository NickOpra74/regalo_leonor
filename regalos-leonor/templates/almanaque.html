<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestro álbum 📖</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>

    body {
      background: radial-gradient(ellipse at 30% 20%, #daeeff 0%, #eee6f7 45%, #fde8ed 100%);
      min-height: 100vh;
      padding-bottom: 50px;
      overflow-x: hidden;
    }

    /* HEADER */
    .alm-header {
      text-align: center;
      padding: 32px 20px 16px;
      position: relative; z-index: 20;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #85C1E9; text-decoration: none;
      font-size: 0.88rem; font-weight: 700; margin-bottom: 10px;
      transition: color .2s;
    }
    .back-link:hover { color: #5DADE2; }
    .alm-header h1 {
      font-size: 1.8rem; color: #3D4A5C;
      font-style: italic; margin-bottom: 2px;
    }
    .alm-header .sub {
      font-family: 'Dancing Script', cursive;
      font-size: 1rem; color: #C39BD3;
    }

    /* LIBRO 3D */
    .book-scene {
      perspective: 2000px;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px;
      position: relative; z-index: 10;
    }

    .book {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      transform-style: preserve-3d;
    }

    .book-back-cover {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #b8d9f0, #c9b8e8);
      border-radius: 4px 18px 18px 4px;
      box-shadow: 4px 6px 24px rgba(90,120,160,.35), inset -3px 0 8px rgba(0,0,0,.08);
    }
    .book-spine {
      position: absolute;
      top: 2%; left: -20px;
      width: 20px; height: 96%;
      background: linear-gradient(180deg, #a8cce0, #b8a8d8);
      border-radius: 6px 0 0 6px;
      box-shadow: -3px 0 10px rgba(0,0,0,.18);
      display: flex; align-items: center; justify-content: center;
    }
    .spine-text {
      writing-mode: vertical-rl; text-orientation: mixed;
      transform: rotate(180deg);
      font-family: 'Dancing Script', cursive;
      font-size: 0.65rem; color: rgba(255,255,255,.88);
      letter-spacing: 2px; white-space: nowrap;
    }
    .book-pages-stack {
      position: absolute; top: 1%; right: -5px;
      width: 7px; height: 98%;
      background: repeating-linear-gradient(
        to bottom, #f5f0e8 0px, #f5f0e8 2px, #e8e0d0 2px, #e8e0d0 3px
      );
      border-radius: 0 3px 3px 0;
      box-shadow: 2px 0 6px rgba(0,0,0,.12);
    }

    /* FLIP */
    .flip-container {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
    }
    .page-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 4px 16px 16px 4px;
      overflow: hidden;
      background: #fffdf8;
    }
    .page-face.back { transform: rotateY(180deg); }

    .flip-container.flip-fwd {
      animation: flipFwd .65s cubic-bezier(.4,0,.2,1) forwards;
    }
    .flip-container.flip-bck {
      animation: flipBck .65s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes flipFwd {
      0%   { transform: rotateY(0deg); }
      45%  { transform: rotateY(-70deg); filter: drop-shadow(-8px 0 14px rgba(0,0,0,.2)); }
      100% { transform: rotateY(-180deg); }
    }
    @keyframes flipBck {
      0%   { transform: rotateY(-180deg); }
      45%  { transform: rotateY(-110deg); filter: drop-shadow(-6px 0 10px rgba(0,0,0,.15)); }
      100% { transform: rotateY(0deg); }
    }

    /* INTERIOR DE PÁGINA */
    .page-inner {
      display: flex; flex-direction: column;
      height: 100%; width: 100%;
    }

    .pg-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px 6px;
      border-bottom: 1px solid #f0e8d8;
      flex-shrink: 0;
    }
    .pg-month {
      font-family: 'Playfair Display', serif;
      font-size: 0.92rem; font-style: italic; color: #3D4A5C;
    }
    .pg-num { font-size: 0.65rem; color: #C0C9D4; }

    /* GRID DE FOTOS — ocupa todo el espacio disponible */
    .photos-grid {
      flex: 1;
      padding: 8px 10px;
      display: grid;
      gap: 7px;
      min-height: 0;
    }

    /* Layouts por cantidad de fotos */
    .photos-grid.n1 { grid-template-columns: 1fr; }
    .photos-grid.n2 { grid-template-columns: 1fr 1fr; }
    .photos-grid.n3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .photos-grid.n3 .photo-cell:first-child { grid-column: 1 / -1; }
    .photos-grid.n4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

    /* Celda: imagen + fecha */
    .photo-cell {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; min-height: 0;
    }

    .photo-cell .img-wrap {
      flex: 1;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.12), inset 0 0 0 1px rgba(255,255,255,.5);
      background: #ede5d8;
      min-height: 0;
      position: relative;
    }
    /* Brillo sutil estilo foto impresa */
    .photo-cell .img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 55%);
      pointer-events: none;
    }

    .photo-cell .img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .photo-cell .photo-date {
      font-size: 0.58rem;
      color: #9BAAB8;
      font-family: 'Dancing Script', cursive;
      text-align: center;
      white-space: nowrap;
      line-height: 1;
      flex-shrink: 0;
    }

    .pg-foot {
      padding: 4px 14px 7px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #f0e8d8; flex-shrink: 0;
    }
    .pg-hearts { font-size: .68rem; color: #F2A7B3; letter-spacing: 2px; }
    .pg-label {
      font-family: 'Dancing Script', cursive;
      font-size: .7rem; color: #C39BD3;
    }

    /* PORTADA */
    .cover-content {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; text-align: center; padding: 28px 20px;
      background: linear-gradient(160deg, #daeeff, #f0e6f8 60%, #fde8ed);
    }
    .cover-icon { font-size: 3rem; margin-bottom: 14px; animation: float 3.5s ease-in-out infinite; }
    .cover-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-style: italic; color: #3D4A5C; margin-bottom: 7px; }
    .cover-sub { font-family: 'Dancing Script', cursive; font-size: 1.05rem; color: #7EB5D4; margin-bottom: 18px; }
    .cover-line { width: 55px; height: 2px; background: linear-gradient(90deg, #85C1E9, #C39BD3); border-radius: 2px; margin: 0 auto 16px; }
    .cover-note { font-size: 0.8rem; color: #9BAAB8; font-style: italic; }
    .open-hint { margin-top: 20px; display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #A8C8E0; animation: pulse-soft 2s ease-in-out infinite; }

    /* CONTINUARÁ */
    .page-continuara {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; text-align: center; padding: 32px 24px;
      background: linear-gradient(160deg, #fffdf8, #fef0f7);
    }
    .cont-icon { font-size: 3rem; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
    .cont-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; color: #3D4A5C; margin-bottom: 10px; }
    .cont-text { font-family: 'Dancing Script', cursive; font-size: 1rem; color: #C39BD3; line-height: 1.7; max-width: 260px; }
    .cont-dots { display: flex; gap: 9px; margin-top: 22px; }
    .cont-dots span { width: 9px; height: 9px; border-radius: 50%; animation: pulse-soft 1.6s ease-in-out infinite; }
    .cont-dots span:nth-child(1) { background: #85C1E9; }
    .cont-dots span:nth-child(2) { background: #F2A7B3; animation-delay: .3s; }
    .cont-dots span:nth-child(3) { background: #C39BD3; animation-delay: .6s; }

    /* CONTROLES */
    .album-controls {
      display: flex; align-items: center;
      justify-content: center; gap: 20px;
      margin-top: 18px; position: relative; z-index: 20;
    }
    .nav-btn {
      width: 50px; height: 50px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.85);
      box-shadow: 0 4px 16px rgba(133,193,233,.28);
      color: #5DADE2; backdrop-filter: blur(8px);
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
    }
    .nav-btn:hover:not(:disabled) { transform: scale(1.12); background: linear-gradient(135deg,#C8E6FA,#D7BDE2); color: #3D4A5C; }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
    #page-counter { font-family: 'Dancing Script', cursive; font-size: 1.05rem; color: #85C1E9; min-width: 68px; text-align: center; }

    .dots-progress { display: flex; justify-content: center; gap: 7px; margin-top: 14px; position: relative; z-index: 20; flex-wrap: wrap; }
    .dot-item { width: 7px; height: 7px; border-radius: 50%; background: #D7BDE2; cursor: pointer; transition: all .3s ease; }
    .dot-item.active { background: #85C1E9; width: 20px; border-radius: 4px; }
    .swipe-hint { text-align: center; font-size: .73rem; color: #C0C9D4; margin-top: 10px; font-style: italic; position: relative; z-index: 20; }
  </style>
</head>
<body>

  <div class="petal-container"></div>

  <audio id="bg-audio" loop preload="auto">
    <source src="{{ url_for('static', filename='assets/audio/musica.mp3') }}" type="audio/mpeg">
  </audio>
  <div id="audio-player-container">
    <button id="audio-toggle-btn">🎵</button>
    <span class="audio-label">Nuestra canción</span>
  </div>

  <header class="alm-header">
    <a href="{{ url_for('menu') }}" class="back-link">← Volver</a>
    <h1>Nuestro álbum 📖</h1>
    <p class="sub">Cada página, un momento nuestro</p>
  </header>

  <div class="book-scene">
    <div class="book" id="book">
      <div class="book-spine"><span class="spine-text">Nuestros recuerdos 💙</span></div>
      <div class="book-pages-stack"></div>
      <div class="book-back-cover"></div>
      <div class="flip-container" id="flipper">
        <div class="page-face front" id="face-front"></div>
        <div class="page-face back"  id="face-back"></div>
      </div>
    </div>
  </div>

  <div class="album-controls">
    <button class="nav-btn" id="prev-btn">&#9664;</button>
    <span id="page-counter">Portada</span>
    <button class="nav-btn" id="next-btn">&#9654;</button>
  </div>
  <div class="dots-progress" id="dots-progress"></div>
  <p class="swipe-hint">Desliza o usa ← →</p>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
  (function () {

    /* ══════════════════════════════════════════
       PÁGINAS — orden exacto que indicaste
       Puedes agregar más fotos o páginas aquí.
       Máx recomendado: 4 fotos por página.
    ══════════════════════════════════════════ */
    const PAGES = [
      { type: 'cover' },

      {
        month: 'Diciembre 2025',
        photos: [
          { src: "{{ url_for('static', filename='assets/images/foto6.jpeg') }}", date: 'Diciembre 2025' }
        ]
      },
      {
        month: 'Enero 2026',
        photos: [
          { src: "{{ url_for('static', filename='assets/images/foto8.jpeg') }}", date: 'Enero 2026' },
          { src: "{{ url_for('static', filename='assets/images/foto5.jpeg') }}", date: 'Enero 2026' }
        ]
      },
      {
        month: 'Febrero 2026',
        photos: [
          { src: "{{ url_for('static', filename='assets/images/foto7.jpeg') }}", date: 'Febrero 2026' },
          { src: "{{ url_for('static', filename='assets/images/foto2.jpeg') }}", date: 'Febrero 2026' }
        ]
      },
      {
        month: 'Marzo 2026',
        photos: [
          { src: "{{ url_for('static', filename='assets/images/foto4.jpeg') }}", date: 'Marzo 2026' },
          { src: "{{ url_for('static', filename='assets/images/foto1.jpeg') }}", date: 'Marzo 2026' },
          { src: "{{ url_for('static', filename='assets/images/foto3.jpeg') }}", date: 'Marzo 2026' }
        ]
      },

      { type: 'continuara' }
    ];

    /* ════════════════════════
       CONSTRUIR HTML
    ════════════════════════ */
    function buildPage(page, idx) {
      if (page.type === 'cover') {
        return `<div class="cover-content">
          <span class="cover-icon">📖</span>
          <div class="cover-title">Nuestro álbum</div>
          <div class="cover-sub">01 · 12 · 2025</div>
          <div class="cover-line"></div>
          <p class="cover-note">Un recuerdo por cada mes juntos</p>
          <div class="open-hint"><span>Abre el libro</span><span>▶</span></div>
        </div>`;
      }
      if (page.type === 'continuara') {
        return `<div class="page-continuara">
          <span class="cont-icon">🌙</span>
          <div class="cont-title">Continuará…</div>
          <p class="cont-text">Esta historia apenas comienza.<br>Cada nuevo mes traerá más páginas,<br>más recuerdos, más nosotros.</p>
          <div class="cont-dots"><span></span><span></span><span></span></div>
        </div>`;
      }

      const n = Math.min(page.photos.length, 4);
      const label = (idx > 0 && idx < PAGES.length - 1) ? `Pág. ${idx}` : '';

      const cellsHTML = page.photos.slice(0, 4).map(p => `
        <div class="photo-cell">
          <div class="img-wrap">
            <img src="${p.src}" alt="${p.date}" loading="lazy">
          </div>
          <span class="photo-date">${p.date}</span>
        </div>`).join('');

      return `
        <div class="page-inner">
          <div class="pg-head">
            <span class="pg-month">${page.month}</span>
            <span class="pg-num">${label}</span>
          </div>
          <div class="photos-grid n${n}">${cellsHTML}</div>
          <div class="pg-foot">
            <span class="pg-hearts">♡ ♡ ♡</span>
            <span class="pg-label">Nuestros recuerdos 💙</span>
          </div>
        </div>`;
    }

    /* ════════════════════════
       NAVEGACIÓN
    ════════════════════════ */
    const flipper = document.getElementById('flipper');
    const front   = document.getElementById('face-front');
    const back    = document.getElementById('face-back');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const counter = document.getElementById('page-counter');
    const dotsEl  = document.getElementById('dots-progress');

    let current  = 0;
    let animating = false;

    PAGES.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot-item' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });

    function syncUI() {
      dotsEl.querySelectorAll('.dot-item').forEach((d, i) =>
        d.classList.toggle('active', i === current));
      if (current === 0)                    counter.textContent = 'Portada';
      else if (current === PAGES.length-1)  counter.textContent = '✦';
      else                                  counter.textContent = `${current} / ${PAGES.length-2}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === PAGES.length - 1;
    }

    function renderFront(i) {
      front.innerHTML = buildPage(PAGES[i], i);
    }

    function goTo(target) {
      if (animating || target === current) return;
      if (target < 0 || target >= PAGES.length) return;
      animating = true;
      const fwd = target > current;
      back.innerHTML = buildPage(PAGES[target], target);
      flipper.classList.remove('flip-fwd','flip-bck');
      void flipper.offsetWidth;
      flipper.classList.add(fwd ? 'flip-fwd' : 'flip-bck');
      current = target;
      syncUI();
      setTimeout(() => {
        renderFront(current);
        flipper.classList.remove('flip-fwd','flip-bck');
        flipper.style.transform = '';
        animating = false;
      }, 660);
    }

    renderFront(0); syncUI();

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'ArrowLeft')  goTo(current - 1);
    });

    let sx = 0;
    const bookEl = document.getElementById('book');
    bookEl.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, { passive: true });
    bookEl.addEventListener('touchend', e => {
      const diff = sx - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 44) diff > 0 ? goTo(current+1) : goTo(current-1);
    });

  })();
  </script>
</body>
</html>
